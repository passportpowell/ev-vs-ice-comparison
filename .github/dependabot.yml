version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      next-and-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      eslint-and-types:
        patterns:
          - "eslint*"
          - "@types/*"
          - "typescript"
      vitest-and-testing:
        patterns:
          - "vitest"
          - "@testing-library/*"
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      data-stack:
        patterns:
          - "pandas"
          - "numpy"
          - "scipy"
          - "scikit-learn"
          - "pandera"
    commit-message:
      prefix: "chore(deps-py)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
